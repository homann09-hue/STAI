name: StockPilot Manual Vercel Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        default: preview
        options:
          - preview
          - production
      production_confirmation:
        description: Type DEPLOY STOCKPILOT PRODUCTION when target is production
        required: false
        type: string

concurrency:
  group: stockpilot-vercel-${{ github.event.inputs.target }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Manual Vercel deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: stockpilot-${{ github.event.inputs.target }}
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      VERCEL_ORG_ID: ${{ secrets.STOCKPILOT_VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.STOCKPILOT_VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.STOCKPILOT_VERCEL_TOKEN }}
      VERCEL_CLI_VERSION: ${{ vars.STOCKPILOT_VERCEL_CLI_VERSION || '54.18.6' }}
    steps:
      - name: Checkout StockPilot AI only
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require explicit production confirmation
        if: ${{ github.event.inputs.target == 'production' }}
        env:
          PRODUCTION_CONFIRMATION: ${{ github.event.inputs.production_confirmation }}
        run: |
          if [ "$PRODUCTION_CONFIRMATION" != "DEPLOY STOCKPILOT PRODUCTION" ]; then
            echo "Production deploy blocked: confirmation phrase mismatch." >&2
            exit 1
          fi

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests with coverage gate
        run: npm run test:coverage

      - name: German wording and legal language audit
        run: npm run qa:grammar

      - name: Safe dependency audit
        run: npm run audit:safe

      - name: Production build for browser gate
        run: npm run build

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Browser E2E smoke gate
        run: npm run test:e2e

      - name: Verify required StockPilot Vercel secrets
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"

      - name: Install Vercel CLI
        run: npm install --global vercel@"$VERCEL_CLI_VERSION"

      - name: Pull Vercel environment
        run: |
          if [ "${{ github.event.inputs.target }}" = "production" ]; then
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          else
            vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          fi

      - name: Build Vercel artifact
        run: |
          if [ "${{ github.event.inputs.target }}" = "production" ]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy preview artifact
        id: deploy-preview
        if: ${{ github.event.inputs.target == 'preview' }}
        run: echo "url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")" >> "$GITHUB_OUTPUT"

      - name: Deploy production artifact
        id: deploy-production
        if: ${{ github.event.inputs.target == 'production' }}
        run: echo "url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        run: |
          if [ "${{ github.event.inputs.target }}" = "production" ]; then
            DEPLOY_URL="${{ steps.deploy-production.outputs.url }}"
          else
            DEPLOY_URL="${{ steps.deploy-preview.outputs.url }}"
          fi

          {
            echo "### StockPilot Vercel deployment"
            echo ""
            echo "- Target: ${{ github.event.inputs.target }}"
            echo "- URL: $DEPLOY_URL"
            echo "- Vercel CLI: $VERCEL_CLI_VERSION"
            echo "- QA gates: typecheck, lint, coverage, grammar, audit, Vercel build"
          } >> "$GITHUB_STEP_SUMMARY"
