name: StockPilot Manual Vercel Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        default: preview
        options:
          - preview
          - production

concurrency:
  group: stockpilot-vercel-${{ github.event.inputs.target }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Manual Vercel deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      VERCEL_ORG_ID: ${{ secrets.STOCKPILOT_VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.STOCKPILOT_VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.STOCKPILOT_VERCEL_TOKEN }}
      VERCEL_CLI_VERSION: ${{ vars.STOCKPILOT_VERCEL_CLI_VERSION || 'latest' }}
    steps:
      - name: Checkout StockPilot AI only
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required StockPilot Vercel secrets
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"

      - name: Install Vercel CLI
        run: npm install --global vercel@"$VERCEL_CLI_VERSION"

      - name: Pull Vercel environment
        run: |
          if [ "${{ github.event.inputs.target }}" = "production" ]; then
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          else
            vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          fi

      - name: Build Vercel artifact
        run: |
          if [ "${{ github.event.inputs.target }}" = "production" ]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy preview artifact
        if: ${{ github.event.inputs.target == 'preview' }}
        run: vercel deploy --prebuilt --token="$VERCEL_TOKEN"

      - name: Deploy production artifact
        if: ${{ github.event.inputs.target == 'production' }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
