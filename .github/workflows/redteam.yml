name: StockPilot Red Team

on:
  workflow_dispatch:

concurrency:
  group: stockpilot-redteam-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  redteam:
    name: Full red-team QA
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      STOCKPILOT_MARKET_PROVIDER: mock
      STOCKPILOT_NEWS_PROVIDER: mock
      STOCKPILOT_FUNDAMENTALS_PROVIDER: mock
      STOCKPILOT_AI_PROVIDER: mock
    steps:
      - name: Checkout StockPilot AI only
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run full red-team suite
        run: npm run qa:redteam
