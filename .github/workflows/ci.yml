name: StockPilot CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: stockpilot-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, lint, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      STOCKPILOT_MARKET_PROVIDER: mock
      STOCKPILOT_NEWS_PROVIDER: mock
      STOCKPILOT_FUNDAMENTALS_PROVIDER: mock
      STOCKPILOT_AI_PROVIDER: mock
    steps:
      - name: Checkout StockPilot AI only
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format hygiene
        run: npm run format:check

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests with coverage gate
        run: npm run test:coverage

      - name: Production build
        run: npm run build

      - name: JavaScript performance budget
        run: npm run performance:budget

      - name: Enterprise static readiness gates
        run: npm run enterprise:check -- --local-only

      - name: German wording and legal language audit
        run: npm run qa:grammar

      - name: Dependency audit
        run: npm run audit:moderate

      - name: Dependency licence audit
        run: npm run audit:licenses

      - name: Generate institutional evidence and CycloneDX SBOM
        run: npm run evidence:generate

      - name: Institutional control verification
        run: npm run institutional:check

      - name: Upload institutional evidence
        uses: actions/upload-artifact@v7
        with:
          name: stockpilot-institutional-evidence
          path: artifacts/evidence/
          if-no-files-found: error
          retention-days: 30
