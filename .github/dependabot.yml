version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - stockpilot
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
      qa-tooling:
        patterns:
          - "@playwright/*"
          - vitest
          - "@vitest/*"
          - eslint
          - typescript

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
